services:
  icecast:
    build: ./icecast
    ports:
      - "8000:8000"
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  liquidsoap:
    build: ./liquidsoap
    volumes:
      - ./liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - /home/theo/sidequests/Musique:/media/music:ro
      - playlist-data:/data/playlists
    ports:
      - "1234:1234"
      - "8005:8005"
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/1234'"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      icecast:
        condition: service_healthy

  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app/app
      - /home/theo/sidequests/Musique:/media/music:ro
      - playlist-data:/data/playlists
      - backend-data:/data
    ports:
      - "8080:8080"
    environment:
      - ICECAST_SOURCE_PASSWORD=${ICECAST_SOURCE_PASSWORD}
      - ICECAST_ADMIN_PASSWORD=${ICECAST_ADMIN_PASSWORD}
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - LIQUIDSOAP_TELNET_HOST=liquidsoap
      - LIQUIDSOAP_TELNET_PORT=1234
      - MUSIC_DIR=/media/music
      - PLAYLIST_DIR=/data/playlists
      - DATABASE_PATH=/data/epirbe.db
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    depends_on:
      icecast:
        condition: service_healthy
      liquidsoap:
        condition: service_healthy

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  playlist-data:
  backend-data:
