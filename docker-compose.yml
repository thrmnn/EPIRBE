services:
  icecast:
    build: ./icecast
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/ || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  liquidsoap:
    build: ./liquidsoap
    volumes:
      - ./liquidsoap/radio.liq:/etc/liquidsoap/radio.liq:ro
      - /home/theo/sidequests/Musique:/media/music:ro
      - playlist-data:/data/playlists
    ports:
      - "1234:1234"
      - "8005:8005"
    depends_on:
      icecast:
        condition: service_healthy

  backend:
    build: ./backend
    volumes:
      - ./backend/app:/app/app
      - /home/theo/sidequests/Musique:/media/music:ro
      - playlist-data:/data/playlists
      - backend-data:/data
    ports:
      - "8080:8080"
    environment:
      - ICECAST_SOURCE_PASSWORD=hackme
      - ICECAST_ADMIN_PASSWORD=adminpass
      - ICECAST_HOST=icecast
      - ICECAST_PORT=8000
      - LIQUIDSOAP_TELNET_HOST=liquidsoap
      - LIQUIDSOAP_TELNET_PORT=1234
      - MUSIC_DIR=/media/music
      - PLAYLIST_DIR=/data/playlists
      - DATABASE_PATH=/data/epirbe.db
    depends_on:
      icecast:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  playlist-data:
  backend-data:
